<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sakshi ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff6a88, #ff99ac, #c471ed);
  overflow: hidden;
}

/* Glow Name */
.glow {
  font-size: 34px;
  color: white;
  text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d, 0 0 30px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff4d6d; }
}

.container {
  text-align: center;
  color: white;
  padding: 20px;
}

p {
  font-size: 18px;
  max-width: 320px;
  margin: auto;
}

/* Buttons */
.btn {
  margin: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: white;
  color: #ff4d6d;
  position: absolute;
}

.btn:hover {
  transform: scale(1.1);
}

/* Floating hearts */
.heart {
  position: absolute;
  animation: float 6s linear;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<div class="container">
  <div class="glow">Sakshi ❤️</div>

  <p>
    Us din maine jo kaha wo galat tha...  
    Mujhe samajh aa gaya hai ki words hurt karte hain.  
    Main bas itna chahta hoon ki agar aap chahein...  
    to hum baat kar sakte hain 💭
  </p>

  <br>

  <button class="btn yes" onclick="yesClicked()">Talk to me? 🥺</button>
  <button class="btn no" id="noBtn">No 😢</button>
</div>

<!-- 🎵 YOUR SONG -->
<audio id="bgMusic" loop>
  <source src="laila.mp3" type="audio/mpeg">
</audio>

<script>
// autoplay music (after first click)
document.body.addEventListener("click", () => {
  document.getElementById("bgMusic").play();
}, { once: true });

// moving NO button
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// YES click → WhatsApp (UPDATED NUMBER)
function yesClicked() {
  window.location.href = "https://wa.me/918800509524?text=Aap%20se%20baat%20karni%20hai%20❤️";
}

// floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 400);

</script>

</body>
</html>
